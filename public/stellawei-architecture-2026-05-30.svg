  <!-- ==================== Cross-Cutting Features ==================== -->
  <rect x="40" y="915" width="1520" height="65" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
  <text x="800" y="935" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">🔄 横切功能 (Cross-Cutting)</text>
  <text x="60" y="955" font-size="9.5" fill="#78350f">• 状态机: pending → paid → confirmed → upcoming → in_progress → ended(5min) → completed</text>
  <text x="60" y="972" font-size="9.5" fill="#78350f">• 时区: UTC存储 + 城市名显示(洛杉矶/北京/东京) + 确认提示</text>
  <text x="700" y="955" font-size="9.5" fill="#78350f">• 语言: i18next + localStorage持久化 + html lang同步</text>
  <text x="700" y="972" font-size="9.5" fill="#78350f">• 响应式: 移动端适配 (首页/后台/聊天/订单)</text>
  <text x="1200" y="955" font-size="9.5" fill="#78350f">• 错误处理: 404/403/500 统一页面</text>
  <text x="1200" y="972" font-size="9.5" fill="#78350f">• 性能: 图片懒加载 / 字体swap / API合并 / 分页加载</text>

